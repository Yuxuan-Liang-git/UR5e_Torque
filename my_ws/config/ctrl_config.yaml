# 控制参数配置文件

# 阻抗控制器配置
impedance_controller:
  # 平移刚度 (N/m), 旋转刚度 (Nm/rad)
  stiffness: [2000.0, 2000.0, 2000.0, 50.0, 50.0, 50.0]
  # 阻尼比
  damping_ratio: [0.7, 0.7, 0.7, 0.7, 0.7, 0.7]

# 后续扩展占位 (暂未实现)
